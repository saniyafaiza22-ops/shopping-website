<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout - Lilac & Loom</title>

  <!-- Fonts & Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <!-- === HEADER === -->
  <header class="checkout-header">
    <div class="checkout-logo" onclick="window.location.href='index.html'">Lilac & Loom</div>
    <nav class="checkout-nav">
      <button class="nav-btn" onclick="window.location.href='index.html'" title="Go to Home">
        <i class="fa-solid fa-house"></i>
      </button>
      <button class="nav-btn clear-btn" onclick="clearCartCheckout()" title="Clear Cart">
        <i class="fa-solid fa-trash"></i>
      </button>
    </nav>
  </header>

  <!-- === CHECKOUT CONTENT === -->
  <main class="checkout-wrapper" id="checkoutWrapper">
    <div class="checkout-card" id="checkoutCard">
      <h2>Billing Details</h2>

      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="custName" placeholder="Enter your full name">
      </div>

      <div class="form-group">
        <label>Phone Number</label>
        <div class="otp-row">
          <input type="text" id="custPhone" placeholder="10-digit mobile number" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          <button type="button" id="sendOtpBtn">Send OTP</button>
        </div>
        <p id="otpDisplay" class="otp-display" style="display:none;"></p>
      </div>

      <div class="form-group">
        <label>Email</label>
        <input type="email" id="custEmail" placeholder="example@email.com">
      </div>

      <div class="form-group">
        <label>Address</label>
        <textarea id="custAddress" rows="3" placeholder="House No, Street, City - Pincode"></textarea>
      </div>

     <!-- ===== Payment Mode (Dynamic like Myntra) ===== -->
<div class="form-group payment-mode-group">
  <label>Payment Mode</label>
  <select id="paymentMode" onchange="updatePaymentFields()">
    <option value="cod">Cash on Delivery</option>
    <option value="card">Credit / Debit Card</option>
    <option value="upi">UPI</option>
    <option value="bank">Net Banking</option>
  </select>
</div>

<!-- Dynamic Payment Fields -->
<div id="paymentDetails" class="payment-details"></div>


      <div class="form-group">
        <label>Delivery Time</label>
        <select id="deliveryTime">
          <option>ASAP (45–60 mins)</option>
          <option>Morning (9am–12pm)</option>
          <option>Afternoon (12pm–4pm)</option>
          <option>Evening (4pm–8pm)</option>
        </select>
      </div>

      <button class="checkout-btn" id="placeOrderBtn">Confirm & Place Order</button>
    </div>

    <!-- ✅ SINGLE ORDER SUMMARY CARD -->
    <aside class="order-card" aria-live="polite" id="orderSummaryCard">
      <div class="summary-header">
        <h3>Order Summary</h3>
        <div class="summary-icons">
          <a href="#" title="Edit"><i class="fa-solid fa-pen"></i></a>
        </div>
      </div>
      <div id="orderSummary"></div>
      <div class="summary-total" id="summaryTotal"></div>
    </aside>
  </main>

  <!-- === OTP MODAL === -->
  <div id="otpModal" class="otp-modal" aria-hidden="true">
    <div class="otp-modal-content" role="dialog" aria-modal="true">
      <button class="close-btn" aria-label="Close" onclick="closeOtpModal()">&times;</button>
      <h3>Enter OTP</h3>
      <p id="otpInfo">We sent a 6-digit OTP to your number</p>

      <div class="otp-inputs">
        <input id="otp1" maxlength="1" oninput="moveNext(this,'otp2')">
        <input id="otp2" maxlength="1" oninput="moveNext(this,'otp3')">
        <input id="otp3" maxlength="1" oninput="moveNext(this,'otp4')">
        <input id="otp4" maxlength="1" oninput="moveNext(this,'otp5')">
        <input id="otp5" maxlength="1" oninput="moveNext(this,'otp6')">
        <input id="otp6" maxlength="1">
      </div>

      <div style="text-align:center; margin-top:10px;">
        <button id="verifyOtpBtn" onclick="verifyOTP()">Verify OTP</button>
      </div>
      <p id="otpStatus" class="otp-status"></p>
    </div>
  </div>

  <!-- === SCRIPTS === -->
  <script src="script.js"></script>
  <script>
    document.getElementById('sendOtpBtn').addEventListener('click', () => sendOTP(true));
    document.getElementById('verifyOtpBtn').addEventListener('click', verifyOTP);
    document.getElementById('placeOrderBtn').addEventListener('click', placeOrderAfterVerify);
    document.addEventListener('DOMContentLoaded', renderOrderSummaryOnLoad);

    function clearCartCheckout() {
      localStorage.removeItem("cartItems");
      alert("Your cart has been cleared!");
      window.location.href = "index.html";
    }

    // === OPEN & CLOSE OTP MODAL (Fixed) ===
    function openOtpModal() {
      const modal = document.getElementById("otpModal");
      modal.classList.add("active");
      modal.style.display = "flex"; // ✅ make it visible
      modal.setAttribute("aria-hidden", "false");
    }

    function closeOtpModal() {
      const modal = document.getElementById("otpModal");
      modal.classList.remove("active");
      modal.style.display = "none"; // ✅ hide when closed
      modal.setAttribute("aria-hidden", "true");
    }
    // ===== Dynamic Payment Field Loader (like Myntra) =====
function updatePaymentFields() {
  const mode = document.getElementById('paymentMode').value;
  const container = document.getElementById('paymentDetails');
  container.innerHTML = ''; // clear previous fields

  if (mode === 'card') {
    container.innerHTML = `
      <div class="card-fields">
        <label>Card Number</label>
        <input type="text" id="cardNumber" maxlength="16" placeholder="XXXX XXXX XXXX XXXX" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        
        <div class="card-row">
          <div>
            <label>Expiry Date</label>
            <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5">
          </div>
          <div>
            <label>CVV</label>
            <input type="password" id="cardCVV" maxlength="3" placeholder="123" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          </div>
        </div>

        <label>Cardholder Name</label>
        <input type="text" id="cardName" placeholder="Name on Card">
      </div>
    `;
  } 
  
  else if (mode === 'upi') {
    const upiId = "lilacloom@upi";
    container.innerHTML = `
      <div class="upi-fields">
        <p>Scan this QR to pay via UPI</p>
        <div class="upi-qr-box">
          <img src="https://api.qrserver.com/v1/create-qr-code/?size=170x170&data=upi://pay?pa=${upiId}&pn=Lilac%20%26%20Loom&am=0" alt="UPI QR Code" />
        </div>
        <p style="margin-top:10px;">or enter UPI ID manually:</p>
        <input type="text" id="upiId" placeholder="example@upi">
      </div>
    `;
  } 
  
  else if (mode === 'bank') {
    container.innerHTML = `
      <div class="bank-fields">
        <label>Select Bank</label>
        <select id="bankName">
          <option>SBI</option>
          <option>HDFC Bank</option>
          <option>ICICI Bank</option>
          <option>Axis Bank</option>
          <option>Kotak Mahindra</option>
        </select>

        <label>Account Holder Name</label>
        <input type="text" id="accName" placeholder="Enter your name">

        <label>Account Number</label>
        <input type="text" id="accNumber" placeholder="Enter Account Number" maxlength="16" oninput="this.value=this.value.replace(/[^0-9]/g,'')">

        <label>IFSC Code</label>
        <input type="text" id="ifscCode" placeholder="Example: SBIN0001234" maxlength="11">
      </div>
    `;
  }

  else if (mode === 'cod') {
    container.innerHTML = `
      <div class="cod-info">
        <p>💵 You can pay in cash when your order is delivered.</p>
      </div>
    `;
  }
}
// ====== Confirm & Place Order (Full Flow) ======
function placeOrderAfterVerify() {
  // Validate form fields
  const name = document.getElementById('custName')?.value.trim();
  const phone = document.getElementById('custPhone')?.value.trim();
  const address = document.getElementById('custAddress')?.value.trim();
  const mode = document.getElementById('paymentMode')?.value;
  
  if (!name || !phone || !address) {
    alert("Please fill in all required fields before placing your order.");
    return;
  }

  if (!isOtpVerified) {
    alert("Please verify your OTP before placing the order.");
    openOtpModal();
    return;
  }

  // Show loading animation
  const btn = document.getElementById('placeOrderBtn');
  btn.disabled = true;
  btn.innerHTML = `<i class='fa fa-spinner fa-spin'></i> Placing Order...`;

  setTimeout(() => {
    // Get cart items
    const cartItems = JSON.parse(localStorage.getItem("cartItems")) || [];
    if (!cartItems.length) {
      alert("Your cart is empty!");
      window.location.href = "index.html";
      return;
    }

    // Build invoice data
    const orderId = "LL" + Math.floor(Math.random() * 1000000);
    const invoiceData = {
      id: orderId,
      date: new Date().toISOString(),
      name,
      address,
      items: cartItems,
    };
    localStorage.setItem("invoiceData", JSON.stringify(invoiceData));

    // Clear cart
    localStorage.removeItem("cartItems");

    // Step 1: Show success animation
    showOrderSuccess(() => {
      // Step 2: Open invoice in new tab
      window.open("invoice.html", "_blank");

      // Step 3: Redirect to delivery tracking page
      window.location.href = "delivery.html";
    });

  }, 1500);
}

// ====== Success Animation Overlay ======
function showOrderSuccess(callback) {
  let overlay = document.createElement("div");
  overlay.className = "order-success-overlay";
  overlay.innerHTML = `
    <div class="success-box">
      <i class="fa-solid fa-check-circle"></i>
      <p>Order Placed Successfully!</p>
    </div>
  `;
  document.body.appendChild(overlay);
  
  setTimeout(() => {
    overlay.classList.add("active");
  }, 50);

  // Remove overlay & continue
  setTimeout(() => {
    overlay.classList.remove("active");
    setTimeout(() => {
      overlay.remove();
      if (callback) callback();
    }, 500);
  }, 2000);
}

  </script>

  <!-- === INLINE HEADER STYLE (kept aesthetic) === -->
  <style>
    .checkout-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 40px;
      background: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      border-radius: 0 0 16px 16px;
    }

    .checkout-logo {
      font-family: 'Dancing Script', cursive;
      font-size: 28px;
      color: #5a1a5e;
      cursor: pointer;
    }

    .checkout-nav {
      display: flex;
      gap: 16px;
    }

    .nav-btn {
      background: #fff;
      border: 2px solid #e2cfea;
      color: #5a1a5e;
      padding: 10px 12px;
      border-radius: 50%;
      cursor: pointer;
      transition: all 0.25s ease;
      font-size: 18px;
    }

    .nav-btn:hover {
      background: #f7ecfa;
      transform: scale(1.1);
    }

    .clear-btn {
      border-color: #f3b8c4;
      color: #a1213a;
    }

    .clear-btn:hover {
      background: #fde9ed;
    }

    /* === OTP Modal (Hidden by Default) === */
.otp-modal {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.45);
  display: none; /* hidden initially */
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  pointer-events: none; /* prevents accidental clicks when hidden */
  transition: opacity 0.3s ease, visibility 0.3s ease;
  z-index: 1000;
}

/* === OTP Modal Visible (Active State) === */
.otp-modal.active {
  display: flex;
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
}

/* === OTP Modal Content Box === */
.otp-modal-content {
  background: #ffffff;
  padding: 25px 35px;
  border-radius: 14px;
  text-align: center;
  box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
  position: relative;
  width: 320px;
  animation: slideIn 0.3s ease;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

/* === OTP Modal Title & Text === */
.otp-modal-content h3 {
  margin-bottom: 8px;
  color: #4b0082;
  font-weight: 600;
}
.otp-modal-content p {
  color: #444;
  font-size: 0.9rem;
}

/* === OTP Input Boxes === */
.otp-inputs {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-top: 12px;
}
.otp-inputs input {
  width: 38px;
  height: 44px;
  text-align: center;
  font-size: 20px;
  border: 2px solid #d5b4f1;
  border-radius: 8px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}
.otp-inputs input:focus {
  border-color: #7c3aed;
  box-shadow: 0 0 5px rgba(124, 58, 237, 0.4);
}

/* === Verify Button === */
#verifyOtpBtn {
  background: #7c3aed;
  color: white;
  border: none;
  padding: 10px 16px;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 12px;
  transition: background 0.3s ease;
}
#verifyOtpBtn:hover {
  background: #6d28d9;
}

/* === OTP Status Text === */
.otp-status {
  margin-top: 10px;
  font-weight: 500;
  min-height: 20px;
}

/* === Close Button === */
.otp-modal-content .close-btn {
  position: absolute;
  top: 8px;
  right: 12px;
  font-size: 22px;
  border: none;
  background: transparent;
  color: #a1213a;
  cursor: pointer;
  transition: transform 0.2s ease, color 0.2s ease;
}
.otp-modal-content .close-btn:hover {
  transform: scale(1.2);
  color: #6b1230;
}

/* === Slide-In Animation === */
@keyframes slideIn {
  from {
    transform: translateY(-25px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}
/* === Payment Mode Dynamic Section === */
.payment-details {
  margin-top: 10px;
  background: #faf7fd;
  border: 1px solid #e2cfea;
  border-radius: 12px;
  padding: 15px;
  animation: fadeIn 0.3s ease;
}

.payment-details label {
  font-weight: 500;
  display: block;
  margin-top: 10px;
  color: #4a044e;
}

.payment-details input, 
.payment-details select {
  width: 100%;
  padding: 8px 10px;
  border: 1px solid #d9c4ec;
  border-radius: 6px;
  outline: none;
  margin-top: 5px;
  transition: 0.2s ease;
  font-size: 14px;
}

.payment-details input:focus, 
.payment-details select:focus {
  border-color: #7c3aed;
  box-shadow: 0 0 5px rgba(124,58,237,0.2);
}

/* Card layout */
.card-row {
  display: flex;
  gap: 10px;
}
.card-row div {
  flex: 1;
}

/* UPI QR Box */
.upi-qr-box {
  margin-top: 10px;
  display: flex;
  justify-content: center;
}
.upi-qr-box img {
  border: 2px solid #7c3aed;
  border-radius: 12px;
  padding: 6px;
  background: #fff;
}

/* Smooth fade animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
/* === Order Success Animation === */
.order-success-overlay {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.4s ease;
  z-index: 2000;
}

.order-success-overlay.active {
  opacity: 1;
  visibility: visible;
}

.success-box {
  text-align: center;
  background: #fff;
  padding: 30px 40px;
  border-radius: 16px;
  box-shadow: 0 8px 20px rgba(0,0,0,0.2);
  animation: popIn 0.5s ease;
}

.success-box i {
  font-size: 60px;
  color: #22c55e;
  animation: pulse 1s infinite alternate;
}

.success-box p {
  font-weight: 600;
  margin-top: 10px;
  font-size: 1.1rem;
  color: #111;
}

@keyframes popIn {
  from { transform: scale(0.8); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}

@keyframes pulse {
  from { transform: scale(1); }
  to { transform: scale(1.1); }
}


  </style>
</body>
</html>
